# Qwen3-32B Judge LoRA, 8-bit (LLM.int8) variant.
# Per-GPU weight footprint ~32GB. Fits in 48GB with gradient checkpointing
# and batch 1. Expect ~1.5-2x slower steps than the 4-bit NF4 variant.

model:
  name_or_path: Qwen/Qwen3-32B
  trust_remote_code: true
  load_in_4bit: false
  load_in_8bit: true
  llm_int8_threshold: 6.0
  attn_implementation: flash_attention_2  # fall back to "sdpa" if FA2 not installed

data:
  train_file: judge_lora_dataset/train.jsonl
  val_file: judge_lora_dataset/val.jsonl
  max_seq_length: 3072
  enable_thinking: false
  mask_prompt_loss: true

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

train:
  output_dir: Judge-lora/outputs/qwen3-32b-judge-lora-8bit
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8        # effective batch = 1 * 4 GPUs * 8 = 32
  learning_rate: 1.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: true
  optim: paged_adamw_8bit
  logging_steps: 10
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  early_stopping_patience: 2
  deepspeed: deepspeed_zero3.json
  report_to: none
  seed: 42
  dataloader_num_workers: 2
  group_by_length: true
