run_name: adversarial-python-curriculum

models:
  socratic:
    model_name_or_path: ./Hints_Not_Answers/runs/socratic_sft/model
    adapter_path: null
    initial_adapter_path: null
    trust_remote_code: true
    device_map: auto
    torch_dtype: bfloat16
    max_input_length: 4096
    quantization:
      load_in_8bit: false
    generation:
      max_new_tokens: 220
      temperature: 0.85
      top_p: 0.92
      repetition_penalty: 1.05
      do_sample: true
      num_return_sequences: 4
      enable_thinking: false
      stop_strings: ["<|im_end|>"]

  red:
    model_name_or_path: Qwen/Qwen3-32B
    adapter_path: null
    initial_adapter_path: null
    trust_remote_code: true
    device_map:
      "": cuda:0
    torch_dtype: bfloat16
    max_input_length: 4096
    quantization:
      load_in_8bit: true
      llm_int8_threshold: 6.0
    generation:
      max_new_tokens: 1200
      temperature: 0.95
      top_p: 0.9
      repetition_penalty: 1.05
      do_sample: true
      num_return_sequences: 1
      enable_thinking: true
      stop_strings: ["<|im_end|>"]

  judge:
    model_name_or_path: Qwen/Qwen3-32B
    adapter_path: null
    initial_adapter_path: null
    trust_remote_code: true
    device_map:
      "": cuda:1
    torch_dtype: bfloat16
    max_input_length: 6144
    quantization:
      load_in_8bit: true
      llm_int8_threshold: 6.0
    generation:
      max_new_tokens: 1000
      temperature: 0.0
      top_p: 1.0
      repetition_penalty: 1.0
      do_sample: false
      num_return_sequences: 1
      enable_thinking: false
      stop_strings: ["<|im_end|>"]

curriculum:
  sample_topics_per_round: 2
  candidates_per_topic: 5
  random_sampling_rounds: 3
  weak_reward_threshold: 0.45
  strong_reward_threshold: 0.8
  weak_topic_boost: 1.18
  strong_topic_decay: 0.9
  min_weight: 0.25
  max_weight: 5.0
  repeated_topic_reset_threshold: 5
  topics:
    - name: lists
      description: list indexing, mutation, copies, and accumulation bugs
      initial_weight: 1.0
    - name: strings
      description: slicing, splitting, joins, and whitespace edge cases
      initial_weight: 1.0
    - name: loops
      description: off-by-one mistakes, loop conditions, and premature returns
      initial_weight: 1.0
    - name: dictionaries
      description: missing keys, mutation during iteration, and update logic
      initial_weight: 1.0
    - name: functions
      description: parameters, returns, default arguments, and scope bugs
      initial_weight: 1.0
    - name: recursion
      description: missing base cases and incorrect recursive step logic
      initial_weight: 1.0
    - name: classes
      description: instance state, class state, method signatures, and mutability
      initial_weight: 1.0

judge:
  min_valid_tasks: 4
  task_validation_batch_size: 4
  hint_assessment_batch_size: 6
  reward_weights:
    no_solution_reveal: 0.3
    bug_localization: 0.25
    usefulness: 0.2
    socratic_style: 0.15
    technical_accuracy: 0.1

training:
  socratic:
    output_dir: artifacts/socratic_grpo
    update_every_tasks: 8
    num_hints_per_task: 4
    learning_rate: 1.0e-5
    epochs: 1
    per_device_batch_size: 1
    gradient_accumulation_steps: 4
    warmup_ratio: 0.03
    weight_decay: 0.0
    optim: adamw_torch
    beta: 0.02
    max_prompt_length: 2048
    max_completion_length: 256
    log_steps: 10
    save_steps: 100
    save_total_limit: 2
    bf16: true
    fp16: false
    gradient_checkpointing: true
    full_ft: false
    lora_r: 32
    lora_alpha: 64
    lora_dropout: 0.05
    lora_target_modules: [q_proj, k_proj, v_proj, o_proj, up_proj, down_proj, gate_proj]
    deepspeed: null

  red:
    output_dir: artifacts/red_training
    update_every_rounds: 2
    learning_rate: 1.0e-4
    epochs: 1
    per_device_batch_size: 1
    gradient_accumulation_steps: 4
    warmup_ratio: 0.03
    weight_decay: 0.0
    optim: adamw_torch
    max_length: 3072
    bf16: true
    fp16: false
    gradient_checkpointing: true
    lora_r: 64
    lora_alpha: 128
    lora_dropout: 0.05
    lora_target_modules: [q_proj, k_proj, v_proj, o_proj, up_proj, down_proj, gate_proj]
    dpo_beta: 0.1
    log_steps: 10
    save_steps: 100
    save_total_limit: 2
    min_positive_examples: 12
    min_dpo_pairs: 6

buffer:
  replay_path: artifacts/buffer/replay.jsonl
  max_records: 5000
  failure_reward_threshold: 0.45
  easy_reward_threshold: 0.85

storage:
  root_dir: artifacts
  state_path: state/pipeline_state.json
  seen_tasks_path: state/seen_tasks.json
  events_path: logs/events.jsonl
  round_snapshots_dir: snapshots

runtime:
  max_rounds: 10
  seed: 42
  retry_invalid_generation_once: true
  unload_red_after_generation: true
  unload_socratic_after_use: true
  empty_cuda_cache_on_unload: true
