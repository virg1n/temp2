runtime:
  seed: 42
  total_episodes: 100
  debug_all: false
  checkpoint_every_episodes: 25
  log_level: INFO

storage:
  root_dir: ./runs/acl_pipeline
  keep_last_n_checkpoints: 3
  hard_buffer_max_size: 2048

curriculum:
  reward_ema_alpha: 0.2
  low_reward_boost: 1.5
  repeat_topic_reset_threshold: 5
  topics:
    - name: Conditional Statements
      weight: 1.0
    - name: Functions and Scope
      weight: 1.0
    - name: Recursion and Generators
      weight: 1.0
    - name: Dictionaries and Sets
      weight: 1.0
    - name: Sorting and Key Functions
      weight: 1.0
    - name: Strings and Parsing
      weight: 1.0
    - name: Objects and Classes
      weight: 1.0
    - name: NumPy and Linear Algebra
      weight: 1.0

socratic:
  model_name_or_path: ./path/to/your/socratic_sft_checkpoint
  tokenizer_name_or_path:
  base_adapter_path:
  quantization:
  enable_thinking: false
  hardware:
    gpu_ids: [1, 2, 3]
    persistent: true
    per_gpu_memory_gib: 46
    cpu_offload_gib: 128
  generation:
    batch_size: 1
    max_new_tokens: 180
    temperature: 0.6
    top_p: 0.9
    do_sample: true
    repetition_penalty: 1.05
  lora:
    enabled: true
    r: 64
    alpha: 128
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, up_proj, down_proj, gate_proj]
  grpo:
    update_every_episodes: 16
    min_episodes_before_update: 8
    max_training_examples: 64
    learning_rate: 1.0e-5
    epochs: 1
    per_device_batch_size: 1
    gradient_accumulation_steps: 4
    warmup_ratio: 0.03
    weight_decay: 0.0
    beta: 0.02
    max_prompt_length: 1536
    max_completion_length: 256
    num_generations: 4
    logging_steps: 10
    save_steps: 100
    save_total_limit: 2
    bf16: true
    fp16: false
    gradient_checkpointing: true
    full_ft: false

judge:
  model_name_or_path: Qwen/Qwen3-32B-Instruct
  tokenizer_name_or_path:
  base_adapter_path:
  quantization: 8bit
  enable_thinking: false
  hardware:
    gpu_ids: [0]
    persistent: true
    per_gpu_memory_gib: 46
    cpu_offload_gib: 128
  generation:
    batch_size: 1
    max_new_tokens: 160
    temperature: 0.0
    top_p: 1.0
    do_sample: false
    repetition_penalty: 1.0

red:
  model_name_or_path: Qwen/Qwen3-32B-Instruct
  tokenizer_name_or_path:
  base_adapter_path:
  quantization:
  generation_quantization: 8bit
  update_quantization: 4bit
  enable_thinking: true
  hardware:
    gpu_ids: [1, 2, 3]
    persistent: false
    per_gpu_memory_gib: 46
    cpu_offload_gib: 128
  generation:
    batch_size: 1
    max_new_tokens: 700
    temperature: 0.9
    top_p: 0.95
    do_sample: true
    repetition_penalty: 1.02
  lora:
    enabled: true
    r: 64
    alpha: 128
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, up_proj, down_proj, gate_proj]
  update:
    update_every_episodes: 32
    min_hard_examples: 24
    hard_reward_threshold: 0.45
    max_sft_examples: 256
    max_dpo_pairs: 128
    learning_rate: 5.0e-5
    epochs: 1
    per_device_batch_size: 1
    gradient_accumulation_steps: 8
    max_length: 2048
    logging_steps: 10
    dpo_enabled: true
    dpo_beta: 0.1
